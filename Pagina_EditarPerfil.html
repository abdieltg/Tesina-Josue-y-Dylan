<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - Sharee</title>
    <link rel="stylesheet" href="css/CSS_EditarPerfil.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Sharee</div>
        <div class="nav-buttons">
            <button onclick="irAlFeed()">← Volver</button>
            <button onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </nav>

    <main class="container">
        <div class="editar-perfil-box">
            <h1>Editar Perfil</h1>

            <div class="foto-section">
                <div class="foto-preview">
                    <img id="fotoPreview" src="" alt="Tu foto de perfil">
                </div>
                <div class="foto-upload">
                    <input type="file" id="inputFoto" accept="image/*">
                    <label for="inputFoto" class="btn-subir">Cambiar foto</label>
                    <p class="info-foto">Tamaño máximo: 5MB. Formatos: JPG, PNG, GIF, WEBP</p>
                </div>
            </div>

            <form id="formularioPerfil">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" readonly>
                </div>

                <div class="form-group">
                    <label for="email">Correo</label>
                    <input type="email" id="email" readonly>
                </div>

                <div class="form-group">
                    <label for="bio">Biografía</label>
                    <textarea id="bio" placeholder="Cuéntanos sobre ti..." maxlength="500"></textarea>
                    <small id="charCount">0/500</small>
                </div>

                <button type="submit" class="btn-guardar">Guardar cambios</button>
                <p id="mensajeResultado" class="mensaje"></p>
            </form>
        </div>
    </main>

    <script src="js/Java_EditarPerfil.js"></script>
</body>
</html>
