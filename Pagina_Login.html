<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Iniciar sesión</title>

    <link rel="stylesheet" href="css/CSS_Login.css" />
  </head>

  <body>
    <div class="container">
      <div class="box">
        <h1>Sharee</h1>

        <form id="loginForm">
          <form id="loginForm">
            <input
              id="loginEmail"
              type="email"
              placeholder="Correo institucional"
              required
            />

            <input
              id="loginPassword"
              type="password"
              placeholder="Contraseña"
              required
            />

            <button type="submit">Iniciar sesión</button>
          </form>
        </form>

        <p id="mensajeLogin" class="mensaje"></p>

        <p class="link">
          Si no tienes cuenta,
          <a href="Pagina_Create.html">Crear cuenta</a>
        </p>
      </div>
    </div>

    <script src="js/Java_Login.js"></script>
  </body>
</html>
