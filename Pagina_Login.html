<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Iniciar sesión</title>

    <link rel="stylesheet" href="CSS_Login.css" />
  </head>

  <body>
    <div class="container">
      <div class="box">
        <h1>OnlyProa</h1>

        <form id="loginForm">
          <input id="loginUsuario" type="text" placeholder="Usuario" required />

          <input
            id="loginPassword"
            type="password"
            placeholder="Contraseña"
            required
          />

          <button type="submit">Iniciar sesión</button>
        </form>

        <p id="mensajeLogin" class="mensaje"></p>

        <p class="link">
          Si no tienes cuenta,
          <a href="Pagina_Create.html">Crear cuenta</a>
        </p>
      </div>
    </div>

    <script src="Java_Login.js"></script>
  </body>
</html>
