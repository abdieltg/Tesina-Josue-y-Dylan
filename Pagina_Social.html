<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Social</title>
    <link rel="stylesheet" href="CSS_Social.css" />
  </head>

  <body>
    <header class="topbar">
      <div class="logo">Sharee</div>

      <input type="text" id="buscar" placeholder="Buscar usuarios" />

      <div class="perfil">
        <img src="https://i.pravatar.cc/40" id="avatar" />
      </div>
    </header>

    <div class="container">
      <aside class="sidebar">
        <a href="#">Inicio</a>
        <a href="#">Explorar</a>
        <a href="#">Mensajes</a>
        <a href="#">Perfil</a>
        <a href="#">Configuración</a>
      </aside>

      <main class="feed">
        <div class="crear-post">
          <img src="https://i.pravatar.cc/40" />

          <input id="postInput" placeholder="¿Qué estás pensando?" />

          <button id="publicarBtn">Publicar</button>
        </div>

        <div id="posts"></div>
      </main>

      <aside class="rightbar">
        <h3>Sugerencias</h3>

        <div class="usuario">
          <img src="https://i.pravatar.cc/40?img=10" />
          <span>coder01</span>
          <button class="seguir">Seguir</button>
        </div>

        <div class="usuario">
          <img src="https://i.pravatar.cc/40?img=11" />
          <span>devmaster</span>
          <button class="seguir">Seguir</button>
        </div>

        <div class="usuario">
          <img src="https://i.pravatar.cc/40?img=12" />
          <span>techuser</span>
          <button class="seguir">Seguir</button>
        </div>
      </aside>
    </div>

    <script src="Java_social.jss"></script>
  </body>
</html>
