<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Social - Sharee</title>
    <link rel="stylesheet" href="css/CSS_Social.css" />
  </head>

  <body>
    <header class="topbar">
      <div class="logo">Sharee</div>

      <input type="text" id="buscar" placeholder="Buscar usuarios" />

      <div class="perfil">
        <img src="https://i.pravatar.cc/40" id="avatar" onclick="irAlPerfilPropio()" style="cursor: pointer;" />
        <button onclick="cerrarSesion()" style="margin-left: 10px; padding: 8px 15px; background-color: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer;">Cerrar sesión</button>
      </div>
    </header>

    <div class="container">
      <aside class="sidebar">
        <a href="Pagina_Social.html">🏠 Inicio</a>
        <a href="#">🔍 Explorar</a>
        <a href="#">💬 Mensajes</a>
        <a href="#" onclick="irAlPerfilPropio()">👤 Perfil</a>
        <a href="#">⚙️ Configuración</a>
      </aside>

      <main class="feed">
        <div class="crear-post">
          <img src="https://i.pravatar.cc/40" id="avatarPost" />

          <input id="postInput" placeholder="¿Qué estás pensando?" />

          <button id="publicarBtn">Publicar</button>
        </div>

        <div id="posts"></div>
      </main>

      <aside class="rightbar">
        <h3>Sugerencias</h3>
        <div id="sugerencias"></div>
      </aside>
    </div>

    <script src="js/Java_social.js"></script>
  </body>
</html>
